<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management System</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --danger: #dc2626;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --surface: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 2rem;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--surface);
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-top: 0;
            color: var(--text);
            border-bottom: 2px solid var(--border);
            padding-bottom: 0.5rem;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 1rem;
            align-items: end;
            margin-bottom: 2rem;
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 6px;
            border: 1px solid var(--border);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 500;
            font-size: 0.9rem;
        }

        input {
            padding: 0.5rem;
            border: 1px solid var(--border);
            border-radius: 4px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        button {
            padding: 0.6rem 1.2rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.2s;
            color: white;
        }

        .btn-primary {
            background-color: var(--primary);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-edit {
            background-color: var(--warning);
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        .btn-delete {
            background-color: var(--danger);
            padding: 0.4rem 0.8rem;
            font-size: 0.85rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background-color: var(--bg);
            font-weight: 600;
        }

        tr:hover {
            background-color: var(--bg);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            color: #64748b;
            font-style: italic;
        }

        /* Responsive */
        @media (max-width: 768px) {
            form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Inventory Manager</h1>

    <form id="inventory-form">
        <input type="hidden" id="item-id">
        
        <div class="form-group">
            <label for="item-name">Item Name</label>
            <input type="text" id="item-name" required placeholder="e.g. Laptop">
        </div>
        
        <div class="form-group">
            <label for="item-qty">Quantity</label>
            <input type="number" id="item-qty" required min="0" placeholder="0">
        </div>
        
        <div class="form-group">
            <label for="item-price">Unit Price ($)</label>
            <input type="number" id="item-price" required min="0" step="0.01" placeholder="0.00">
        </div>
        
        <div class="form-group">
            <button type="submit" class="btn-primary" id="submit-btn">Add Item</button>
        </div>
    </form>

    <table>
        <thead>
            <tr>
                <th>Item Name</th>
                <th>Quantity</th>
                <th>Unit Price</th>
                <th>Total Value</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="inventory-table-body">
            </tbody>
    </table>
</div>

<script>
    // --- State Management ---
    let inventory = JSON.parse(localStorage.getItem('inventoryData')) || [];

    // DOM Elements
    const form = document.getElementById('inventory-form');
    const tableBody = document.getElementById('inventory-table-body');
    const submitBtn = document.getElementById('submit-btn');
    const idInput = document.getElementById('item-id');
    const nameInput = document.getElementById('item-name');
    const qtyInput = document.getElementById('item-qty');
    const priceInput = document.getElementById('item-price');

    // --- READ: Render the table ---
    function renderTable() {
        tableBody.innerHTML = ''; // Clear current table

        if (inventory.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="5" class="empty-state">No items in inventory. Add one above!</td></tr>`;
            return;
        }

        inventory.forEach(item => {
            const totalValue = (item.qty * item.price).toFixed(2);
            const row = document.createElement('tr');

            row.innerHTML = `
                <td>${item.name}</td>
                <td>${item.qty}</td>
                <td>$${parseFloat(item.price).toFixed(2)}</td>
                <td>$${totalValue}</td>
                <td class="actions">
                    <button class="btn-edit" onclick="editItem('${item.id}')">Edit</button>
                    <button class="btn-delete" onclick="deleteItem('${item.id}')">Delete</button>
                </td>
            `;
            tableBody.appendChild(row);
        });
    }

    // --- CREATE & UPDATE: Handle Form Submission ---
    form.addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent page reload

        const id = idInput.value;
        const name = nameInput.value.trim();
        const qty = parseInt(qtyInput.value);
        const price = parseFloat(priceInput.value);

        if (id) {
            // Update existing item
            const index = inventory.findIndex(item => item.id === id);
            if (index !== -1) {
                inventory[index] = { id, name, qty, price };
            }
            submitBtn.textContent = 'Add Item'; // Reset button text
        } else {
            // Create new item
            const newItem = {
                id: Date.now().toString(), // Generate a simple unique ID
                name,
                qty,
                price
            };
            inventory.push(newItem);
        }

        saveData();
        form.reset();
        idInput.value = ''; // Clear hidden ID
        renderTable();
    });

    // --- UPDATE (Setup Form): Populate form with item data ---
    function editItem(id) {
        const item = inventory.find(item => item.id === id);
        if (item) {
            idInput.value = item.id;
            nameInput.value = item.name;
            qtyInput.value = item.qty;
            priceInput.value = item.price;
            
            submitBtn.textContent = 'Update Item'; // Change button text
            nameInput.focus();
        }
    }

    // --- DELETE: Remove item from array ---
    function deleteItem(id) {
        if (confirm('Are you sure you want to delete this item?')) {
            inventory = inventory.filter(item => item.id !== id);
            saveData();
            renderTable();
            
            // If they delete the item they are currently editing, reset the form
            if (idInput.value === id) {
                form.reset();
                idInput.value = '';
                submitBtn.textContent = 'Add Item';
            }
        }
    }

    // Save array to LocalStorage
    function saveData() {
        localStorage.setItem('inventoryData', JSON.stringify(inventory));
    }

    // Initial render on page load
    renderTable();

</script>
</body>
</html>
