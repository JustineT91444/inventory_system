<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Inventory System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h1>Inventory Dashboard</h1>
        <div class="total-badge">
            Total Stock Value: <span id="grand-total">$0.00</span>
        </div>
    </div>

    <section class="form-section">
        <form id="inventory-form">
            <input type="hidden" id="item-id">
            
            <div class="form-group">
                <label for="item-name">Item Name</label>
                <input type="text" id="item-name" required placeholder="e.g., MacBook Pro">
            </div>
            
            <div class="form-group">
                <label for="item-qty">Quantity</label>
                <input type="number" id="item-qty" required min="1" placeholder="0">
            </div>
            
            <div class="form-group">
                <label for="item-price">Price ($)</label>
                <input type="number" id="item-price" required min="0.01" step="0.01" placeholder="0.00">
            </div>
            
            <div class="form-group">
                <button type="submit" class="btn-primary" id="submit-btn">Save Item</button>
            </div>
        </form>
    </section>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Product</th>
                    <th>Qty</th>
                    <th>Unit Price</th>
                    <th>Total</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="inventory-table-body">
                </tbody>
        </table>
    </div>
</div>

<script src="./js/script.js"></script>
</body>
</html>
